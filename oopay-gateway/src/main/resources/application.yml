server:
  port: 8080

spring:
  application:
    name: oopay-gateway
  cloud:
    gateway:
      routes:
        - id: merchant-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/merchant/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/pay/**
          filters:
            - StripPrefix=1
        - id: account-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/account/**
          filters:
            - StripPrefix=1
        - id: notify-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notify/**
          filters:
            - StripPrefix=1
        - id: admin-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 5000ms

logging:
  level:
    com.oopay: DEBUG
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
