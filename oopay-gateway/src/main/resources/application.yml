server:
  port: 8080

spring:
  application:
    name: oopay-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 商户服务路由
        - id: oopay-merchant
          uri: lb://oopay-merchant
          predicates:
            - Path=/api/merchant/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                key-resolver: "#{@ipKeyResolver}"
        # 支付服务路由
        - id: oopay-payment
          uri: lb://oopay-payment
          predicates:
            - Path=/api/pay/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipKeyResolver}"
        # 账户服务路由
        - id: oopay-account
          uri: lb://oopay-account
          predicates:
            - Path=/api/account/**
          filters:
            - StripPrefix=1
        # 通知服务路由
        - id: oopay-notify
          uri: lb://oopay-notify
          predicates:
            - Path=/api/notify/**
          filters:
            - StripPrefix=1
        # 管理服务路由
        - id: oopay-admin
          uri: lb://oopay-admin
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# 日志配置
logging:
  level:
    root: INFO
    com.oopay.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId}] %-5level %logger{50} - %msg%n"

# 限流配置
oopay:
  rate-limit:
    enabled: true
    replenish-rate: 100
    burst-capacity: 200

---
# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    health:
      show-details: when_authorized
