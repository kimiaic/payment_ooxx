# .github/workflows/99-state-monitor.yml
name: 📊 State Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 每 5 分钟检查
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install GitHub CLI
        run: |
          type -p gh || (apt-get update && apt-get install -y gh)
      
      - name: Check Phase 0 Status
        run: |
          echo "🔍 检查 Phase 0 状态..."
          
          # 获取 Agent-01 和 Agent-02 的状态
          AGENT_01_STATUS=$(gh run list --workflow="🤖 Agent-01 - Infra Core" --limit 1 --json conclusion --jq '.[0].conclusion')
          AGENT_02_STATUS=$(gh run list --workflow="🤖 Agent-02 - Infra Gateway" --limit 1 --json conclusion --jq '.[0].conclusion')
          
          echo "Agent-01: $AGENT_01_STATUS"
          echo "Agent-02: $AGENT_02_STATUS"
          
          # 如果都成功，标记 Phase 0 完成
          if [ "$AGENT_01_STATUS" == "success" ] && [ "$AGENT_02_STATUS" == "success" ]; then
            echo "✅ Phase 0 完成"
            echo "PHASE_0_DONE=true" >> $GITHUB_ENV
          fi
      
      - name: Check Phase 1 Status
        run: |
          echo "🔍 检查 Phase 1 状态..."
          
          AGENTS=("03" "04" "05")
          ALL_DONE=true
          
          for agent in "${AGENTS[@]}"; do
            STATUS=$(gh run list --workflow="🤖 Agent-$agent" --limit 1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "unknown")
            echo "Agent-$agent: $STATUS"
            
            if [ "$STATUS" != "success" ]; then
              ALL_DONE=false
            fi
          done
          
          if [ "$ALL_DONE" = true ]; then
            echo "✅ Phase 1 完成"
            echo "PHASE_1_DONE=true" >> $GITHUB_ENV
          fi
      
      - name: Check Phase 2 Status
        run: |
          echo "🔍 检查 Phase 2 状态..."
          
          AGENTS=("06" "07" "08")
          ALL_DONE=true
          
          for agent in "${AGENTS[@]}"; do
            STATUS=$(gh run list --workflow="🤖 Agent-$agent" --limit 1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "unknown")
            echo "Agent-$agent: $STATUS"
            
            if [ "$STATUS" != "success" ]; then
              ALL_DONE=false
            fi
          done
          
          if [ "$ALL_DONE" = true ]; then
            echo "✅ Phase 2 完成"
            echo "PHASE_2_DONE=true" >> $GITHUB_ENV
          fi
      
      - name: Check Phase 3 Status
        run: |
          echo "🔍 检查 Phase 3 状态..."
          
          AGENTS=("09" "10")
          ALL_DONE=true
          
          for agent in "${AGENTS[@]}"; do
            STATUS=$(gh run list --workflow="🤖 Agent-$agent" --limit 1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "unknown")
            echo "Agent-$agent: $STATUS"
            
            if [ "$STATUS" != "success" ]; then
              ALL_DONE=false
            fi
          done
          
          if [ "$ALL_DONE" = true ]; then
            echo "✅ Phase 3 完成"
            echo "PHASE_3_DONE=true" >> $GITHUB_ENV
          fi
      
      - name: Check Phase 4 Status
        run: |
          echo "🔍 检查 Phase 4 状态..."
          
          AGENTS=("11" "12")
          ALL_DONE=true
          
          for agent in "${AGENTS[@]}"; do
            STATUS=$(gh run list --workflow="🤖 Agent-$agent" --limit 1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "unknown")
            echo "Agent-$agent: $STATUS"
            
            if [ "$STATUS" != "success" ]; then
              ALL_DONE=false
            fi
          done
          
          if [ "$ALL_DONE" = true ]; then
            echo "✅ Phase 4 完成"
            echo "PHASE_4_DONE=true" >> $GITHUB_ENV
          fi
      
      - name: Trigger Phase 2 (if Phase 1 done)
        if: env.PHASE_1_DONE == 'true'
        run: |
          echo "🚀 Phase 1 完成，检查是否已触发 Phase 2..."
          
          # 检查 Phase 2 是否已经开始
          PHASE_2_STARTED=$(cat .github/progress/status.json 2>/dev/null | jq -r '.phases."phase-2".status' || echo "unknown")
          
          if [ "$PHASE_2_STARTED" != "in_progress" ] && [ "$PHASE_2_STARTED" != "completed" ]; then
            echo "🚀 自动触发 Phase 2"
            
            for agent in 06 07 08; do
              gh workflow run 0${agent}-agent-*.yml \
                -f contract_version="v1.0" \
                -f trigger_source="phase-gate-controller" || true
            done
            
            # 更新状态文件
            jq '.phases."phase-2".status = "in_progress"' .github/progress/status.json > tmp.json && mv tmp.json .github/progress/status.json
          fi
      
      - name: Trigger Phase 3 (if Phase 2 done)
        if: env.PHASE_2_DONE == 'true'
        run: |
          echo "🚀 Phase 2 完成，检查是否已触发 Phase 3..."
          
          PHASE_3_STARTED=$(cat .github/progress/status.json 2>/dev/null | jq -r '.phases."phase-3".status' || echo "unknown")
          
          if [ "$PHASE_3_STARTED" != "in_progress" ] && [ "$PHASE_3_STARTED" != "completed" ]; then
            echo "🚀 自动触发 Phase 3"
            
            for agent in 09 10; do
              gh workflow run 0${agent}-agent-*.yml \
                -f contract_version="v1.0" \
                -f trigger_source="phase-gate-controller" || true
            done
          fi
      
      - name: Trigger Phase 4 (if Phase 3 done)
        if: env.PHASE_3_DONE == 'true'
        run: |
          echo "🚀 Phase 3 完成，检查是否已触发 Phase 4..."
          
          PHASE_4_STARTED=$(cat .github/progress/status.json 2>/dev/null | jq -r '.phases."phase-4".status' || echo "unknown")
          
          if [ "$PHASE_4_STARTED" != "in_progress" ] && [ "$PHASE_4_STARTED" != "completed" ]; then
            echo "🚀 自动触发 Phase 4"
            
            for agent in 11 12; do
              gh workflow run 0${agent}-agent-*.yml \
                -f contract_version="v1.0" \
                -f trigger_source="phase-gate-controller" || true
            done
          fi
      
      - name: Trigger Integration Test (if all done)
        if: env.PHASE_4_DONE == 'true'
        run: |
          echo "🎉 所有 Phase 完成，触发集成测试..."
          
          # 检查集成测试是否已运行
          INTEGRATION_STATUS=$(gh run list --workflow="🔧 Integration Test" --limit 1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "unknown")
          
          if [ "$INTEGRATION_STATUS" == "unknown" ] || [ "$INTEGRATION_STATUS" == "null" ]; then
            echo "🚀 触发集成测试"
            gh workflow run 20-integration-test.yml || true
          fi
      
      - name: Update Progress JSON
        run: |
          echo "📝 更新进度文件..."
          
          # 这里可以生成更详细的进度报告
          cat > .github/progress/last-update.txt << EOF
          Last Update: $(date -Iseconds)
          Phase 0: ${{ env.PHASE_0_DONE }}
          Phase 1: ${{ env.PHASE_1_DONE }}
          Phase 2: ${{ env.PHASE_2_DONE }}
          Phase 3: ${{ env.PHASE_3_DONE }}
          Phase 4: ${{ env.PHASE_4_DONE }}
          EOF
      
      - name: Commit Progress Update
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .github/progress/
          git commit -m "chore: 更新进度状态 [skip ci]" || true
          git push || true
