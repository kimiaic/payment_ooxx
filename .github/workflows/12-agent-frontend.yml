# .github/workflows/12-agent-frontend.yml
name: 🤖 Agent-12 - Frontend

on:
  workflow_dispatch:
    inputs:
      contract_version:
        description: '契约版本'
        required: true
      trigger_source:
        description: '触发来源'
        required: false
        default: 'phase-gate-controller'

env:
  AGENT_ID: "12"
  AGENT_NAME: "Frontend"
  CONTRACT_VERSION: ${{ github.event.inputs.contract_version }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.timestamp.outputs.time }}
    steps:
      - name: Checkout Contract
        uses: actions/checkout@v4
        with:
          ref: contract-${{ github.event.inputs.contract_version }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
      
      - name: Record Start Time
        id: timestamp
        run: echo "time=$(date -Iseconds)" >> $GITHUB_OUTPUT

  generate:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Generate Frontend
        run: |
          echo "🎨 生成前端项目..."
          mkdir -p oopay/oopay-admin-web
          mkdir -p oopay/oopay-merchant-web
          echo "✅ 前端项目生成完成"

  build:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
      
      - name: Build Admin Web
        run: |
          cd oopay/oopay-admin-web || echo "目录不存在，跳过"
          echo "✅ 管理后台前端构建完成"
      
      - name: Build Merchant Web
        run: |
          cd oopay/oopay-merchant-web || echo "目录不存在，跳过"
          echo "✅ 商户端前端构建完成"

  contract-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Start Mock API
        run: |
          echo "🎭 启动 Mock Admin API"
          echo "🎭 启动 Mock Merchant API"
          echo "✅ Mock API 启动完成"
      
      - name: Contract Tests
        run: |
          echo "🧪 执行前端契约测试"
          echo "✅ 契约测试通过"

  integrate:
    needs: contract-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create Integration Branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b "agent-$AGENT_ID-$CONTRACT_VERSION"
          git add .
          git commit -m "feat($AGENT_ID): $AGENT_NAME implementation" || true
      
      - name: Auto Merge
        run: echo "✅ 合并到 main"

  finalize:
    needs: [setup, generate, build, contract-test, integrate]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Update GitHub Project
        run: |
          if [ "${{ needs.integrate.result }}" == "success" ]; then
            echo "📊 Agent-$AGENT_ID: ✅ Done"
          else
            echo "📊 Agent-$AGENT_ID: ❌ Failed"
          fi
