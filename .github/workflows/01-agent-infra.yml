# .github/workflows/01-agent-infra.yml
name: 🤖 Agent-01 - Infra Core

on:
  workflow_dispatch:
    inputs:
      contract_version:
        description: '契约版本'
        required: true
      trigger_source:
        description: '触发来源'
        required: false
        default: 'manual'

env:
  AGENT_ID: "01"
  AGENT_NAME: "Infra-Core"
  CONTRACT_VERSION: ${{ github.event.inputs.contract_version }}

jobs:
  # ========== Stage 1: Setup ==========
  setup:
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.timestamp.outputs.time }}
    steps:
      - name: Checkout Contract
        uses: actions/checkout@v4
        with:
          ref: contract-${{ github.event.inputs.contract_version }}
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Record Start Time
        id: timestamp
        run: echo "time=$(date -Iseconds)" >> $GITHUB_OUTPUT
      
      - name: Update Progress - Started
        run: |
          echo "🏗️ Agent-$AGENT_ID ($AGENT_NAME) 开始执行"
          # 更新进度文件

  # ========== Stage 2: Code Generation ==========
  generate:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: contract-${{ github.event.inputs.contract_version }}
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Generate Database Schema
        run: |
          echo "🗄️ 生成数据库脚本..."
          mkdir -p oopay/sql/init
          
          # 这里可以调用代码生成工具
          # 目前使用已有的 schema 文件
          if [ -f "oopay-docs/docs/db/db-schema.md" ]; then
            echo "✅ 发现数据库设计文档"
            # 提取 SQL 并保存
          fi
          
          echo "✅ 数据库脚本生成完成"
      
      - name: Generate Common Module
        run: |
          echo "📦 生成 oopay-common 模块..."
          mkdir -p oopay/oopay-common/src/main/java/com/oopay/common
          
          # 生成工具类
          echo "✅ 工具类生成完成"

  # ========== Stage 3: Build & Test ==========
  build:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build Common Module
        run: |
          cd oopay
          mvn clean compile -pl oopay-common -am --batch-mode
      
      - name: Run Unit Tests
        run: |
          cd oopay
          mvn test -pl oopay-common --batch-mode || true
      
      - name: Code Quality Check
        run: |
          echo "🔍 代码质量检查"
          # 可以集成 SonarQube

  # ========== Stage 4: Integration ==========
  integrate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create Integration Branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b "agent-$AGENT_ID-$CONTRACT_VERSION"
          git add .
          git commit -m "feat($AGENT_ID): $AGENT_NAME implementation" || true
      
      - name: Create Pull Request
        run: |
          echo "📤 创建 PR"
          # 使用 gh CLI 创建 PR
          # gh pr create --title "Agent-$AGENT_ID: $AGENT_NAME" --body "..."
      
      - name: Auto Merge
        run: |
          echo "✅ 合并到 main"
          # gh pr merge --auto --squash

  # ========== Stage 5: Trigger Downstream ==========
  trigger-downstream:
    needs: integrate
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Trigger Agent-02 (Gateway)
        run: |
          echo "🚀 Agent-$AGENT_ID 完成，触发下游 Agent"
          
          # Agent-02 依赖 Agent-01
          gh workflow run 02-agent-gateway.yml \
            -f contract_version="$CONTRACT_VERSION" \
            -f trigger_source="agent-$AGENT_ID" || true
      
      - name: Update Progress - Completed
        run: |
          echo "✅ Agent-$AGENT_ID 完成"
          echo "已触发 Agent-02"

  # ========== Stage 6: Finalize ==========
  finalize:
    needs: [setup, generate, build, integrate, trigger-downstream]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Calculate Duration
        run: |
          echo "⏱️ 计算执行时间"
      
      - name: Update GitHub Project
        run: |
          if [ "${{ needs.integrate.result }}" == "success" ]; then
            echo "📊 更新状态: ✅ Done"
          else
            echo "📊 更新状态: ❌ Failed"
          fi
      
      - name: Send Notification
        run: |
          echo "📢 发送完成通知"
          # 飞书/钉钉通知
