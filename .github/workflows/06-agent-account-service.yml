name: 🤖 Agent-06 - Account-Service (Design Phase)

on:
  workflow_dispatch:
    inputs:
      contract_version:
        description: '契约版本'
        required: true
        default: 'v1.0'
      trigger_source:
        description: '触发来源'
        required: false
        default: 'manual'

env:
  AGENT_ID: "06"
  AGENT_NAME: "Account-Service"
  CONTRACT_VERSION: ${{ github.event.inputs.contract_version }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.timestamp.outputs.time }}
    steps:
      - uses: actions/checkout@v4
      - id: timestamp
        run: echo "time=$(date -Iseconds)" >> $GITHUB_OUTPUT
      - run: |
          echo "📋 Agent-06 (Account-Service) - 需求分析"
          echo "设计内容: 账户服务设计、余额管理"
          echo "✅ 需求分析完成"

  design:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "📝 生成设计文档..."
          mkdir -p designs/agent-06
          cat > designs/agent-06/design.md << 'DESIGN'
          # Agent-06 Account-Service 设计文档
          
          ## 模块职责
          - 账户服务设计、余额管理
          
          ## 设计要点
          1. 接口定义
          2. 数据模型
          3. 流程设计
          4. Mock 实现
          
          ## 生成时间
          Sat Apr 11 12:42:15 AM CST 2026
          DESIGN
          echo "✅ 设计文档完成"

  contract:
    needs: design
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "☕ 生成接口定义..."
          mkdir -p designs/agent-06/interfaces
          echo "// Agent-06 接口定义" > designs/agent-06/interfaces/Service.java
          echo "✅ 接口定义完成"

  mock:
    needs: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "🎭 生成 Mock 实现..."
          mkdir -p designs/agent-06/mocks
          echo "// Agent-06 Mock 实现" > designs/agent-06/mocks/MockService.java
          echo "✅ Mock 实现完成"

  submit:
    needs: [analyze, design, contract, mock]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          mkdir -p designs/agent-06/{interfaces,mocks}
          echo "# Agent-06 Design" > designs/agent-06/design.md
          git add designs/
          git commit -m "design(06): Account-Service - $CONTRACT_VERSION" || true
          git push origin HEAD:design/agent-06-$CONTRACT_VERSION || true

  finalize:
    needs: [analyze, design, contract, mock, submit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo "✅ Agent-06 (Account-Service) 设计阶段完成"
          echo "📊 状态: ${{ needs.submit.result }}"
